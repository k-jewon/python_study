{% extends 'base.html' %}

{% block title %}글쓰기 - 게시판{% endblock %}

{% block content %}
<div class="form-container">
    <h2>글쓰기</h2>
    <form method="post" action="{{ url_for('post_create') }}">
        <div class="form-group">
            <label for="title">제목 *</label>
            <input type="text" id="title" name="title" value="{{ title }}" required maxlength="200" placeholder="제목을 입력하세요">
        </div>
        <div class="form-group">
            <label for="author">작성자 *</label>
            <input type="text" id="author" name="author" value="{{ author }}" required maxlength="50" placeholder="작성자명을 입력하세요">
        </div>
        <div class="form-group">
            <label for="password">비밀번호 *</label>
            <input type="password" id="password" name="password" required maxlength="100" placeholder="수정/삭제 시 사용할 비밀번호">
        </div>
        <div class="form-group">
            <label for="content">내용 *</label>
            <textarea id="content" name="content" required rows="12" placeholder="내용을 입력하세요">{{ content }}</textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">등록</button>
        </div>
    </form>
</div>
{% endblock %}
